body{margin:0;padding:14px;background:transparent;color:#263228;font-family:"Microsoft YaHei",serif}main{max-width:720px;margin:auto;border:1px solid #ddd0b8;border-radius:16px;overflow:hidden;background:#f7efe2;box-shadow:0 14px 34px #0002}.top{position:relative;overflow:hidden;min-height:170px;padding:26px;color:white;background:linear-gradient(#24403099,#244030dd),linear-gradient(135deg,#456d55,#91a367,#c48c50)}.top:after{content:"";position:absolute;left:-5%;right:-5%;bottom:-18px;height:92px;background:repeating-linear-gradient(12deg,#224a35 0 12px,#78935b 12px 34px);clip-path:polygon(0 45%,100% 5%,100% 100%,0 100%)}h1,.top p{position:relative;z-index:1}h1{margin:0 0 10px;font-size:38px}.top p,.txt{line-height:1.8}.box{padding:24px;background:linear-gradient(#26322808 1px,transparent 1px),linear-gradient(90deg,#26322808 1px,transparent 1px),#fff7e8;background-size:22px 22px}h2{font-size:26px}.txt{color:#485247}.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.card{padding:12px;border:1px solid #ddd0b8;border-radius:12px;background:#fffdf7}.card span{display:block;color:#777;font-size:12px}.card b{font-size:20px}button{margin:8px 8px 0 0;border:0;border-radius:99px;padding:12px 18px;background:#5f7c55;color:white;font:inherit}.alt{background:#c28a4c}.bud{width:100px;height:100px;border-radius:50%;font-weight:bold}@media(max-width:620px){.row{grid-template-columns:1fr 1fr}button{width:100%}}
</style><main><div class=top><h1>采茶女的一天</h1><p>关于时间、体力和收入的互动体验。</p></div><div class=box><h2 id=t>天还没亮，她已经醒了。</h2><p class=txt id=p>一天只有24小时。劳动多一点，休息就少一点。</p><div class=row id=s></div><div id=x></div><div id=c><button onclick=start()>开始这一天</button></div></div></main><script>
let a={T:"04:30",e:100,w:0,m:0,f:3,l:0,q:0,r:"未知",p:12,n:0};let $=x=>document.getElementById(x),C=n=>Math.max(0,Math.min(100,n));function S(){a.m=Math.round(a.w*a.p);a.f=Math.max(0,Math.min(8,15-a.l-a.q));$("s").innerHTML=[["时间",a.T],["体力",Math.round(a.e)+"%"],["采摘",a.w.toFixed(1)+"斤"],["收入",a.m+"元"]].map(i=>`<div class=card><span>${i[0]}</span><b>${i[1]}</b></div>`).join("")}function V(t,p,b,x=""){$("t").textContent=t;$("p").innerHTML=p;$("x").innerHTML=x;$("c").innerHTML=b.map(v=>`<button class="${v[2]?"alt":""}" onclick="${v[1]}">${v[0]}</button>`).join("");S()}function start(){a.T="04:30";V("清晨出发","整理背篓、雨衣和水壶。",[['立刻出发','road(1)'],['多睡一会儿','road(0)',1]])}function road(n){a.e+=n?-8:8;a.l+=n?1:-.5;a.q++;a.T="05:30";V("上山路","路途不计酬，却消耗体力和时间。",[['继续上山','weather()']])}function weather(){let w=[["晴天",12,0,0],["小雨",11,.5,-5],["暴雨",10,2,0]][Math.random()*3|0];a.r=w[0];a.p=w[1];a.q+=w[2];a.e+=w[3];a.T="07:00";V("天气："+a.r,"天气改变效率，也改变收入。",[['进入茶垄','harvest()']])}function harvest(){a.T="09:00";V("开始采摘","点击茶芽：采摘增加，体力下降。",[['结束采摘','noon()',1]],'<p><button class="bud" onclick="pick()">采下一芽</button></p>')}function pick(){a.w+=a.e<8?.03:.08;a.e-=a.e<8?.4:1.4;a.l+=.025;if(++a.n%12==0)a.q+=.1;a.e=C(a.e);S()}function noon(){a.T="12:10";V("午间选择","休息恢复体力，继续采摘增加收入。",[['喝水休息','after(0)',1],['继续采摘','after(1)']])}function after(n){if(n){a.e-=12;a.w+=.9;a.l+=1.2}else{a.e+=22;a.q+=.5}a.T="15:30";V("下午","再坚持，还是提前下山称重？",[['再坚持','end(1)'],['提前称重','end(0)',1]])}function end(n){if(n){a.w+=1.2;a.e-=18;a.l+=1.6}else a.q+=1.2;a.q++;a.T="17:40";V("称重","茶叶会变成工钱，但等待和疲惫很难写进结算单。",[['查看结算','result()']])}function result(){a.T="21:30";S();let z=[["天气",a.r],["劳动",a.l.toFixed(1)+"小时"],["等待",a.q.toFixed(1)+"小时"],["自由",a.f.toFixed(1)+"小时"]].map(i=>`<div class=card><span>${i[0]}</span><b>${i[1]}</b></div>`).join("");V("今日结算单","数据之外，还有重复劳动、等待和不确定。",[['重新体验','location.reload()',1]],`<div class=row>${z}</div>`)}S()
</script>
