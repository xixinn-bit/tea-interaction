<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>采茶女的一天：时间账本互动体验</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --ink: #233027;
      --muted: #68746a;
      --paper: #f6f1e7;
      --field: #5f7c55;
      --leaf: #8aa467;
      --tea: #c58b48;
      --clay: #a35d3b;
      --line: rgba(35, 48, 39, 0.14);
      --shadow: 0 18px 42px rgba(33, 38, 32, 0.16);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: transparent;
      color: var(--ink);
      font-family: "Noto Serif SC", "Songti SC", "Microsoft YaHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 18px;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .app {
      width: min(980px, 100%);
      min-height: 660px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 308px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .story {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .hero {
      position: relative;
      min-height: 210px;
      padding: 26px 28px;
      overflow: hidden;
      color: #fffaf0;
      background:
        linear-gradient(180deg, rgba(31, 47, 35, 0.28), rgba(31, 47, 35, 0.68)),
        linear-gradient(135deg, #496d56 0%, #789061 50%, #bd8a55 100%);
    }

    .tea-rows {
      position: absolute;
      inset: auto -6% -18px -6%;
      height: 128px;
      background:
        repeating-linear-gradient(-9deg, rgba(255, 255, 255, 0.12) 0 7px, transparent 7px 23px),
        repeating-linear-gradient(9deg, rgba(18, 64, 44, 0.34) 0 12px, rgba(82, 122, 68, 0.62) 12px 36px);
      clip-path: polygon(0 35%, 100% 0, 100% 100%, 0 100%);
      opacity: 0.95;
    }

    .sun {
      position: absolute;
      top: 28px;
      right: 44px;
      width: 74px;
      height: 74px;
      border-radius: 999px;
      background: #f3bf67;
      box-shadow: 0 0 34px rgba(243, 191, 103, 0.48);
    }

    .worker {
      position: absolute;
      right: 112px;
      bottom: 35px;
      width: 58px;
      height: 86px;
      color: #fffaf0;
    }

    .worker::before {
      content: "";
      position: absolute;
      top: 0;
      left: 13px;
      width: 32px;
      height: 18px;
      border-radius: 50%;
      background: #e8d09d;
      box-shadow: 0 13px 0 -5px #5a3d2d;
    }

    .worker::after {
      content: "";
      position: absolute;
      top: 27px;
      left: 18px;
      width: 25px;
      height: 45px;
      border-radius: 14px 14px 8px 8px;
      background: #9f4e38;
      transform: skewX(-7deg);
    }

    .basket {
      position: absolute;
      right: 82px;
      bottom: 50px;
      width: 42px;
      height: 32px;
      border-radius: 6px 6px 16px 16px;
      border: 3px solid rgba(255, 250, 240, 0.82);
      border-top: 0;
      transform: rotate(-10deg);
    }

    .kicker {
      position: relative;
      z-index: 1;
      display: inline-block;
      margin: 0 0 12px;
      padding: 5px 10px;
      border: 1px solid rgba(255, 250, 240, 0.4);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.12);
      font-size: 13px;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0 0 10px;
      max-width: 520px;
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1.18;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subtitle {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0;
      font-size: 15px;
      line-height: 1.85;
      color: rgba(255, 250, 240, 0.86);
    }

    .scene {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 20px;
      padding: 26px 28px;
      background:
        linear-gradient(rgba(35, 48, 39, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(35, 48, 39, 0.035) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    .scene-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--tea);
      box-shadow: 0 0 0 5px rgba(197, 139, 72, 0.16);
    }

    .scene-title {
      margin: 0 0 14px;
      font-size: 25px;
      line-height: 1.38;
      font-weight: 700;
    }

    .scene-text {
      max-width: 650px;
      margin: 0;
      color: #435047;
      font-size: 16px;
      line-height: 1.95;
    }

    .choices {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .choice-btn,
    .start-btn {
      min-height: 42px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--field);
      color: #fffaf0;
      box-shadow: 0 8px 18px rgba(47, 76, 52, 0.18);
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .choice-btn:hover,
    .start-btn:hover {
      transform: translateY(-1px);
      background: #496a48;
    }

    .choice-btn.secondary {
      background: var(--tea);
    }

    .choice-btn.secondary:hover {
      background: #aa763b;
    }

    .ledger {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 24px;
      border-left: 1px solid var(--line);
      background: #fffaf0;
    }

    .time-pill {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f7ead7;
    }

    .time-pill span,
    .stats-title {
      display: block;
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .time-pill strong {
      display: block;
      font-size: 31px;
      line-height: 1;
      color: var(--clay);
    }

    .stat {
      padding: 13px 0;
      border-top: 1px solid var(--line);
    }

    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .stat-row strong {
      color: var(--ink);
      font-weight: 700;
      white-space: nowrap;
    }

    .bar {
      width: 100%;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(35, 48, 39, 0.1);
    }

    .bar-fill {
      width: 0;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--tea), var(--field));
      transition: width 0.24s ease;
    }

    .mini-note,
    .footer-note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.75;
    }

    .harvest-box {
      width: min(100%, 420px);
      margin-top: 20px;
      padding: 18px;
      border: 1px dashed rgba(95, 124, 85, 0.42);
      border-radius: 14px;
      background: rgba(255, 250, 240, 0.68);
      text-align: center;
    }

    .tea-bud-btn {
      width: 126px;
      height: 126px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 28%, rgba(255, 255, 255, 0.46), transparent 20%),
        linear-gradient(145deg, #9eb771, #4f734b);
      color: #fffaf0;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 16px 30px rgba(47, 76, 52, 0.24);
      transition: transform 0.08s ease;
    }

    .tea-bud-btn:active {
      transform: scale(0.95);
    }

    .harvest-tip {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .result-item {
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fffaf0;
    }

    .result-item span {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .result-item strong {
      display: block;
      color: var(--ink);
      font-size: 21px;
      font-weight: 700;
    }

    .warning {
      color: #9d4f31;
      font-weight: 700;
    }

    @media (max-width: 820px) {
      body {
        padding: 10px;
      }

      .app {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .ledger {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .hero,
      .scene,
      .ledger {
        padding: 22px;
      }

      .hero {
        min-height: 230px;
      }

      .worker {
        right: 76px;
      }

      .basket {
        right: 48px;
      }
    }

    @media (max-width: 520px) {
      .hero {
        min-height: 250px;
      }

      .sun {
        width: 56px;
        height: 56px;
        right: 24px;
      }

      .result-grid {
        grid-template-columns: 1fr;
      }

      .choice-btn,
      .start-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="app" aria-label="采茶女的一天互动体验">
    <section class="story">
      <header class="hero">
        <div class="sun" aria-hidden="true"></div>
        <div class="tea-rows" aria-hidden="true"></div>
        <div class="worker" aria-hidden="true"></div>
        <div class="basket" aria-hidden="true"></div>
        <span class="kicker">互动体验｜时间的账</span>
        <h1>采茶女的一天</h1>
        <p class="subtitle">
          你将替她经历一个采茶日：出发、天气、劳动、休息和称重。每一个选择，都会改变收入、体力和剩下属于自己的时间。
        </p>
      </header>

      <section class="scene">
        <div>
          <div class="scene-label">
            <span class="dot" aria-hidden="true"></span>
            <span id="sceneLabel">清晨</span>
          </div>
          <h2 class="scene-title" id="sceneTitle">天还没有亮，她已经醒了。</h2>
          <p class="scene-text" id="sceneText">
            今天，你要替她安排一天。但一天只有24小时，劳动多一点，休息就会少一点；休息多一点，收入也可能少一点。
          </p>
          <div id="extraArea"></div>
        </div>

        <div class="choices" id="choices">
          <button class="start-btn" type="button" onclick="startDay()">开始这一天</button>
        </div>
      </section>
    </section>

    <aside class="ledger" aria-label="今日账本">
      <div class="time-pill">
        <span>当前时间</span>
        <strong id="currentTime">04:30</strong>
      </div>

      <div>
        <h3 class="stats-title">今日账本</h3>

        <div class="stat">
          <div class="stat-row">
            <span>体力</span>
            <strong id="staminaText">100%</strong>
          </div>
          <div class="bar"><div class="bar-fill" id="staminaBar"></div></div>
        </div>

        <div class="stat">
          <div class="stat-row">
            <span>采摘量</span>
            <strong id="weightText">0.0斤</strong>
          </div>
          <div class="bar"><div class="bar-fill" id="weightBar"></div></div>
        </div>

        <div class="stat">
          <div class="stat-row">
            <span>预计收入</span>
            <strong id="incomeText">0元</strong>
          </div>
          <div class="bar"><div class="bar-fill" id="incomeBar"></div></div>
        </div>

        <div class="stat">
          <div class="stat-row">
            <span>剩余自由时间</span>
            <strong id="freeText">3.0小时</strong>
          </div>
          <div class="bar"><div class="bar-fill" id="freeBar"></div></div>
        </div>
      </div>

      <p class="mini-note">
        注：本互动为简化模拟，用来帮助理解劳动时间、体力消耗和收入之间的关系。正式使用时，可按你们查到的数据调整参数。
      </p>
    </aside>
  </main>

  <script>
    const state = {
      time: "04:30",
      stamina: 100,
      weight: 0,
      income: 0,
      freeTime: 3,
      laborHours: 0,
      waitingHours: 0,
      weather: "未知",
      pricePerJin: 12,
      harvestClicks: 0
    };

    const params = {
      clickWeight: 0.08,
      clickStaminaCost: 1.4,
      targetWeightForFullBar: 8,
      maxIncomeForFullBar: 120
    };

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function setTime(t) {
      state.time = t;
      document.getElementById("currentTime").textContent = t;
    }

    function updateStats() {
      state.income = Math.max(0, Math.round(state.weight * state.pricePerJin));
      state.freeTime = clamp(24 - 6 - state.laborHours - state.waitingHours - 3, 0, 8);

      document.getElementById("staminaText").textContent = Math.round(state.stamina) + "%";
      document.getElementById("weightText").textContent = state.weight.toFixed(1) + "斤";
      document.getElementById("incomeText").textContent = state.income + "元";
      document.getElementById("freeText").textContent = state.freeTime.toFixed(1) + "小时";

      document.getElementById("staminaBar").style.width = clamp(state.stamina, 0, 100) + "%";
      document.getElementById("weightBar").style.width = clamp(state.weight / params.targetWeightForFullBar * 100, 0, 100) + "%";
      document.getElementById("incomeBar").style.width = clamp(state.income / params.maxIncomeForFullBar * 100, 0, 100) + "%";
      document.getElementById("freeBar").style.width = clamp(state.freeTime / 6 * 100, 0, 100) + "%";
    }

    function setScene({ label, title, text, time, choices, extra = "" }) {
      if (time) setTime(time);
      document.getElementById("sceneLabel").textContent = label;
      document.getElementById("sceneTitle").textContent = title;
      document.getElementById("sceneText").innerHTML = text;
      document.getElementById("extraArea").innerHTML = extra;

      const choicesEl = document.getElementById("choices");
      choicesEl.innerHTML = "";

      choices.forEach((choice) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-btn " + (choice.type || "");
        btn.textContent = choice.text;
        btn.onclick = choice.action;
        choicesEl.appendChild(btn);
      });

      updateStats();
    }

    function startDay() {
      setScene({
        label: "04:30｜清晨",
        title: "天还没有亮，宿舍里已经有人起身。",
        text: "背篓、雨衣和水壶要提前整理好。你可以马上出发，争取更长的采摘时间；也可以多睡一会儿，但白天能采的时间会被压缩。",
        time: "04:30",
        choices: [
          {
            text: "立刻出发",
            action: () => {
              state.stamina -= 8;
              state.laborHours += 1;
              morningRoad("立刻出发");
            }
          },
          {
            text: "多睡一会儿",
            type: "secondary",
            action: () => {
              state.stamina += 8;
              state.laborHours -= 0.5;
              morningRoad("多睡一会儿");
            }
          }
        ]
      });
    }

    function morningRoad(choice) {
      state.stamina = clamp(state.stamina, 0, 100);
      state.waitingHours += 1;

      const sentence = choice === "立刻出发"
        ? "你赶在天亮前上路。路途不算进工钱里，却同样消耗体力和时间。"
        : "你多睡了一会儿。身体轻松了一点，但今天能留给采摘的时间也少了一点。";

      setScene({
        label: "05:30｜上山路",
        title: "去茶园的路，先花掉了一段时间。",
        text: sentence + "<br><br>山路、等待、整理工具，这些时间不一定直接计酬，却已经写进一天的成本里。",
        time: "05:30",
        choices: [
          { text: "继续上山", action: weatherEvent }
        ]
      });
    }

    function weatherEvent() {
      const weatherOptions = [
        {
          title: "今天是晴天，可以正常采茶。",
          effect: () => {
            state.weather = "晴天";
            state.pricePerJin = 12;
          },
          text: "天气正常，茶园开工。你能采更多茶，但也意味着更长时间弯腰劳动。"
        },
        {
          title: "小雨落下来，采摘效率变慢了。",
          effect: () => {
            state.weather = "小雨";
            state.pricePerJin = 11;
            state.waitingHours += 0.5;
            state.stamina -= 5;
          },
          text: "雨没有大到完全停工，却让山路更滑，采摘更慢。时间还在走，收入却未必同步增加。"
        },
        {
          title: "雨势变大，上午只能等待。",
          effect: () => {
            state.weather = "暴雨";
            state.pricePerJin = 10;
            state.waitingHours += 2;
            state.freeTime -= 1;
          },
          text: "不是不想工作，而是天气让茶山停了下来。等待同样消耗一天，却不能稳定换成收入。"
        }
      ];

      const picked = weatherOptions[Math.floor(Math.random() * weatherOptions.length)];
      picked.effect();

      setScene({
        label: "07:00｜天气",
        title: picked.title,
        text: picked.text,
        time: "07:00",
        choices: [
          { text: "进入茶垄", action: startHarvest }
        ]
      });
    }

    function startHarvest() {
      setScene({
        label: "09:00｜采摘",
        title: "现在，重复的劳动开始了。",
        text: "点击中间的茶芽按钮进行采摘。每点击一次，采摘量增加，体力下降。你会发现：收入不是凭空出现的，它来自持续重复的动作。",
        time: "09:00",
        extra: `
          <div class="harvest-box">
            <button class="tea-bud-btn" type="button" id="teaBudBtn">采下一芽</button>
            <p class="harvest-tip" id="harvestTip">连续点击，模拟一段重复采摘。体力过低时，效率会下降。</p>
          </div>
        `,
        choices: [
          { text: "结束这一段采摘", action: afterHarvest, type: "secondary" }
        ]
      });

      document.getElementById("teaBudBtn").onclick = harvestClick;
    }

    function harvestClick() {
      if (state.stamina <= 8) {
        state.weight += params.clickWeight * 0.35;
        state.stamina -= 0.4;
        document.getElementById("harvestTip").innerHTML = "<span class='warning'>体力很低，采摘效率明显下降。你还能继续，但每一次动作都更慢。</span>";
      } else {
        state.weight += params.clickWeight;
        state.stamina -= params.clickStaminaCost;
      }

      state.harvestClicks += 1;
      state.laborHours += 0.025;

      if (state.harvestClicks % 12 === 0) {
        state.waitingHours += 0.1;
      }

      state.stamina = clamp(state.stamina, 0, 100);
      updateStats();
    }

    function afterHarvest() {
      setScene({
        label: "12:10｜午间",
        title: "午饭很短，选择却不轻松。",
        text: "你已经采了一上午。现在可以短暂休息，恢复一些体力；也可以继续采摘，把时间尽量换成收入。",
        time: "12:10",
        choices: [
          {
            text: "喝水休息半小时",
            type: "secondary",
            action: () => {
              state.stamina += 22;
              state.waitingHours += 0.5;
              state.stamina = clamp(state.stamina, 0, 100);
              afternoonChoice("休息");
            }
          },
          {
            text: "继续采摘",
            action: () => {
              state.stamina -= 12;
              state.weight += 0.9;
              state.laborHours += 1.2;
              state.stamina = clamp(state.stamina, 0, 100);
              afternoonChoice("继续");
            }
          }
        ]
      });
    }

    function afternoonChoice(choice) {
      const text = choice === "休息"
        ? "你恢复了一些体力，但时间也被花掉了。对她来说，休息不是没有代价的。"
        : "你多采了一些茶叶，预计收入增加了，但体力继续下降，晚上的个人时间也被进一步压缩。";

      setScene({
        label: "15:30｜下午",
        title: "离称重还有一段时间。",
        text: text + "<br><br>现在你要决定，是再坚持一段，还是提前下山去排队称重。",
        time: "15:30",
        choices: [
          {
            text: "再坚持一段",
            action: () => {
              state.weight += 1.2;
              state.stamina -= 18;
              state.laborHours += 1.6;
              state.stamina = clamp(state.stamina, 0, 100);
              weighScene();
            }
          },
          {
            text: "提前下山称重",
            type: "secondary",
            action: () => {
              state.waitingHours += 1.2;
              weighScene();
            }
          }
        ]
      });
    }

    function weighScene() {
      state.waitingHours += 1;
      setScene({
        label: "17:40｜称重",
        title: "一天的劳动，终于被放上秤。",
        text: "竹篓里的茶叶会被换算成工钱。但上山路、等待称重、疲惫的身体和被挤压的夜晚，很难一起写进这张结算单。",
        time: "17:40",
        choices: [
          { text: "查看今日结算", action: showResult }
        ]
      });
    }

    function showResult() {
      updateStats();

      const finalText = state.freeTime <= 1
        ? "今天几乎没有留下真正属于自己的时间。"
        : state.freeTime <= 3
          ? "今天还剩下一点个人时间，但它很可能被洗漱、联系家人和休整继续占用。"
          : "今天看起来还有一些时间，但这建立在天气、体力和收入都相对顺利的条件上。";

      setScene({
        label: "21:30｜夜晚",
        title: "今日结算单",
        text: "这一天结束了。你得到了一串数字：劳动时间、采摘量、收入、剩余时间。可是数据之外，还有重复劳动、等待、不确定和疲惫。",
        time: "21:30",
        extra: `
          <div class="result-grid">
            <div class="result-item">
              <span>天气情况</span>
              <strong>${state.weather}</strong>
            </div>
            <div class="result-item">
              <span>劳动时间</span>
              <strong>${state.laborHours.toFixed(1)}小时</strong>
            </div>
            <div class="result-item">
              <span>路途与等待</span>
              <strong>${state.waitingHours.toFixed(1)}小时</strong>
            </div>
            <div class="result-item">
              <span>采茶重量</span>
              <strong>${state.weight.toFixed(1)}斤</strong>
            </div>
            <div class="result-item">
              <span>预计收入</span>
              <strong>${state.income}元</strong>
            </div>
            <div class="result-item">
              <span>剩余自由时间</span>
              <strong>${state.freeTime.toFixed(1)}小时</strong>
            </div>
          </div>
          <p class="footer-note">${finalText}<br>这只是一次极简模拟。现实中的采茶劳动，还包括更长的路途、季节性流动、雨天停工和家庭责任。</p>
        `,
        choices: [
          { text: "重新体验一次", action: restart, type: "secondary" }
        ]
      });
    }

    function restart() {
      state.time = "04:30";
      state.stamina = 100;
      state.weight = 0;
      state.income = 0;
      state.freeTime = 3;
      state.laborHours = 0;
      state.waitingHours = 0;
      state.weather = "未知";
      state.pricePerJin = 12;
      state.harvestClicks = 0;

      document.getElementById("extraArea").innerHTML = "";
      document.getElementById("choices").innerHTML = '<button class="start-btn" type="button" onclick="startDay()">开始这一天</button>';
      document.getElementById("sceneLabel").textContent = "清晨";
      document.getElementById("sceneTitle").textContent = "天还没有亮，她已经醒了。";
      document.getElementById("sceneText").textContent = "今天，你要替她安排一天。但一天只有24小时，劳动多一点，休息就会少一点；休息多一点，收入也可能少一点。";
      setTime("04:30");
      updateStats();
    }

    updateStats();
  </script>
</body>
</html>
